type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: postgresql
    version: "12.1.6"
    repository: "https://charts.bitnami.com/bitnami"
  - name: redis
    version: "17.11.3"
    repository: "https://charts.bitnami.com/bitnami"
  - name: kafka
    version: "22.1.3"
    repository: "https://charts.bitnami.com/bitnami"
  - name: neo4j
    version: "5.15.0"
    repository: "https://helm.neo4j.com/neo4j"
