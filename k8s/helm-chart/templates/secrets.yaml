apiVersion: v1
kind: Secret
metadata:
  name: {{ include "logi-resilience.fullname" . }}-secrets
  labels:
    {{- include "logi-resilience.labels" . | nindent 4 }}
type: Opaque
data:
  # Base64 values for default secrets
  POSTGRES_PASSWORD: {{ "mca_postgres_password_2026" | b64enc | quote }}
  NEO4J_PASSWORD: {{ "mca_secure_password_2026" | b64enc | quote }}
  MINIO_SECRET_KEY: {{ "minio_admin_secret_2026" | b64enc | quote }}
  VAULT_TOKEN: {{ "dev-only-token" | b64enc | quote }}
