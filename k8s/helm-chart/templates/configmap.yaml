apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "logi-resilience.fullname" . }}-config
  labels:
    {{- include "logi-resilience.labels" . | nindent 4 }}
data:
  ENVIRONMENT: {{ .Values.env.ENVIRONMENT | quote }}
  NEO4J_URI: "bolt://{{ include "logi-resilience.fullname" . }}-neo4j:7687"
  NEO4J_USER: "neo4j"
  REDIS_URL: "redis://{{ .Release.Name }}-redis-master:6379"
  CELERY_BROKER_URL: "redis://{{ .Release.Name }}-redis-master:6379/1"
  POSTGRES_HOST: "{{ .Release.Name }}-postgresql"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: {{ .Values.env.POSTGRES_DB | quote }}
  POSTGRES_USER: {{ .Values.env.POSTGRES_USER | quote }}
  KAFKA_BOOTSTRAP_SERVERS: "{{ .Release.Name }}-kafka:9092"
  KAFKA_TELEMETRY_TOPIC: "logistics.telemetry"
  KAFKA_ENABLED: "true"
  MINIO_ENDPOINT: "{{ include "logi-resilience.fullname" . }}-minio:9000"
  MINIO_ACCESS_KEY: "minio_admin"
  MINIO_BUCKET: "model-registry"
  MINIO_SECURE: "false"
  VAULT_ADDR: "http://{{ include "logi-resilience.fullname" . }}-vault:8200"
  OLLAMA_BASE_URL: "http://{{ include "logi-resilience.fullname" . }}-ollama:11434"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://{{ include "logi-resilience.fullname" . }}-jaeger:4317"
  GF_SERVER_ROOT_URL: "http://localhost/grafana/"
