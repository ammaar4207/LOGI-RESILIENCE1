replicaCount:
  backend: 1
  frontend: 1
  worker: 1

image:
  repository: ghcr.io/yourorg/logi-resilience
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  backendPort: 8000
  frontendPort: 80

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: logi-resilience.example.com
      paths:
        - path: /
          pathType: ImplementationSpecific

resources:
  backend:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi
  frontend:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
  worker:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi

env:
  POSTGRES_DB: "logiresilience"
  POSTGRES_USER: "postgres"
  ENVIRONMENT: "production"
