x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --app-dir .
    restart: unless-stopped
    mem_limit: 512m
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging: *default-logging
    environment:
      - GIT_PYTHON_REFRESH=quiet
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=mca_secure_password_2026
      - REDIS_URL=redis://redis:6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_ENABLED=false
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=mca_postgres_password_2026
      - POSTGRES_DB=logiresilience
      - POSTGRES_HOST=postgres
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minio_admin
      - MINIO_SECRET_KEY=minio_admin_secret_2026
      - MINIO_BUCKET=model-registry
      - ENVIRONMENT=development
      - WEATHER_API_KEY=${WEATHER_API_KEY:-}
      - NEWS_API_KEY=${NEWS_API_KEY:-}
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python app/worker.py
    restart: unless-stopped
    mem_limit: 512m
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging: *default-logging
    environment:
      - GIT_PYTHON_REFRESH=quiet
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=mca_secure_password_2026
      - REDIS_URL=redis://redis:6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_ENABLED=false
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=mca_postgres_password_2026
      - POSTGRES_DB=logiresilience
      - POSTGRES_HOST=postgres
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minio_admin
      - MINIO_SECRET_KEY=minio_admin_secret_2026
      - MINIO_BUCKET=model-registry
      - WEATHER_API_KEY=${WEATHER_API_KEY:-}
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_healthy
      kafka:
        condition: service_started
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    restart: unless-stopped
    mem_limit: 256m
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    logging: *default-logging
    environment:
      - VITE_API_URL=
    depends_on:
      backend:
        condition: service_healthy

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    restart: unless-stopped
    mem_limit: 2048m
    deploy:
      resources:
        limits:
          memory: 2048M
          cpus: "1.0"
    logging: *default-logging
    environment:
      - NEO4J_AUTH=neo4j/mca_secure_password_2026
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 40s

  mosquitto:
    image: eclipse-mosquitto:2.0.18
    ports:
      - "1883:1883"
      - "9002:9002"
    restart: unless-stopped
    mem_limit: 128m
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    logging: *default-logging
    # Run with default config allowing anonymous for testing
    command: mosquitto -c /mosquitto-no-auth.conf
    volumes:
      - ./mosquitto.conf:/mosquitto-no-auth.conf

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    mem_limit: 128m
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    restart: unless-stopped
    mem_limit: 512m
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging: *default-logging
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=mca_postgres_password_2026
      - POSTGRES_DB=logiresilience
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-01-28T22-35-53Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped
    mem_limit: 256m
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging: *default-logging
    environment:
      - MINIO_ROOT_USER=minio_admin
      - MINIO_ROOT_PASSWORD=minio_admin_secret_2026
    volumes:
      - minio_data:/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    restart: unless-stopped
    mem_limit: 256m
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    logging: *default-logging
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    restart: unless-stopped
    mem_limit: 1024m
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.0"
    logging: *default-logging
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  prometheus:
    image: prom/prometheus:v2.49.1
    ports:
      - "9090:9090"
    restart: unless-stopped
    mem_limit: 256m
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging: *default-logging
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:10.3.1
    ports:
      - "3000:3000"
    restart: unless-stopped
    mem_limit: 256m
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    logging: *default-logging
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SERVER_ROOT_URL=http://localhost/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    restart: unless-stopped
    mem_limit: 128m
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    logging: *default-logging
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.celery_app worker --loglevel=info
    restart: unless-stopped
    mem_limit: 512m
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging: *default-logging
    environment:
      - GIT_PYTHON_REFRESH=quiet
      - REDIS_URL=redis://redis:6379
      - CELERY_BROKER_URL=redis://redis:6379/1
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=mca_secure_password_2026
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=mca_postgres_password_2026
      - POSTGRES_DB=logiresilience
      - POSTGRES_HOST=postgres
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minio_admin
      - MINIO_SECRET_KEY=minio_admin_secret_2026
      - MINIO_BUCKET=model-registry
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.9.2
    ports:
      - "5000:5000"
    restart: unless-stopped
    mem_limit: 256m
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging: *default-logging
    environment:
      - AWS_ACCESS_KEY_ID=minio_admin
      - AWS_SECRET_ACCESS_KEY=minio_admin_secret_2026
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root s3://model-registry
      --host 0.0.0.0
      --port 5000
      --static-prefix /mlflow

  jobmanager:
    image: flink:1.18.1-scala_2.12
    ports:
      - "8081:8081"
    restart: unless-stopped
    mem_limit: 512m
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging: *default-logging
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager

  taskmanager:
    image: flink:1.18.1-scala_2.12
    depends_on:
      - jobmanager
    restart: unless-stopped
    mem_limit: 512m
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging: *default-logging
    command: taskmanager
    scale: 1
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    restart: unless-stopped
    mem_limit: 2048m
    deploy:
      resources:
        limits:
          memory: 2048M
          cpus: "1.5"
    logging: *default-logging
    volumes:
      - ollama_data:/root/.ollama

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "4317:4317"
    restart: unless-stopped
    mem_limit: 256m
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    logging: *default-logging
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  keycloak:
    image: quay.io/keycloak/keycloak:23.0.4
    command: start-dev
    restart: unless-stopped
    mem_limit: 1024m
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.0"
    logging: *default-logging
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_DATABASE: logiresilience
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: mca_postgres_password_2026
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  vault:
    image: hashicorp/vault:latest
    ports:
      - "8200:8200"
    restart: unless-stopped
    mem_limit: 128m
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    logging: *default-logging
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=dev-only-token
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
    cap_add:
      - IPC_LOCK

volumes:
  neo4j_data:
  postgres_data:
  minio_data:
  mlflow_data:
  ollama_data:
